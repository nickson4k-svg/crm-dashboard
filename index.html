<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B CRM Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">CRM.Admin</div>

            <nav aria-label="CRM navigation">
                <ul>
                    <li class="active" data-nav="clients">

                        <span class="nav-icon" aria-hidden="true">
                            <i class="fa-solid fa-users"></i>
                        </span>
                        <span class="nav-label">Клієнти</span>
                    </li>
                    <li data-nav="invoices">
                        <span class="nav-icon" aria-hidden="true">
                            <i class="fa-solid fa-receipt"></i>
                        </span>
                        <span class="nav-label">Рахунки</span>
                    </li>
                    <li data-nav="analytics">
                        <span class="nav-icon" aria-hidden="true">
                            <i class="fa-solid fa-chart-line"></i>
                        </span>
                        <span class="nav-label">Аналітика</span>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="search-wrap">
                    <span class="search-icon" aria-hidden="true">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" id="searchInput" placeholder="Пошук за компанією, контактом або статусом...">
                </div>

                <div class="topbar-actions">
                    <button id="openModalBtn" class="btn-primary"><span aria-hidden="true">+</span> Додати клієнта</button>

                    <div class="profile" aria-label="Admin profile">
                        <button type="button" id="profileBtn" class="profile-btn" aria-haspopup="menu" aria-expanded="false">

                            <span class="profile-avatar" aria-hidden="true">JD</span>
                            <span class="profile-text">John Doe <span class="profile-role">(Admin)</span></span>
                            <span class="profile-caret" aria-hidden="true"><i class="fa-solid fa-chevron-down"></i></span>
                        </button>
                        <div id="profileMenu" class="profile-menu" role="menu" aria-labelledby="profileBtn" hidden>
                            <button type="button" class="menu-item" role="menuitem">Профіль</button>
                            <button type="button" class="menu-item" role="menuitem">Налаштування</button>


                            <button type="button" class="menu-item" role="menuitem">Вихід</button>
                        </div>

                    </div>
                </div>
            </header>

            <section class="clients-header">
                <div class="clients-heading">
                    <div class="clients-title">Клієнти</div>
                    <div class="clients-sub">Керуйте лідами, демо та угодами.</div>
                </div>
                <div class="clients-hint" aria-live="polite" id="resultsHint">Показано 20 клієнтів</div>

                <div class="filters" aria-label="Client filters">

                    <div class="filter-row">
                        <label for="filterStatus" class="sr-only">Статус</label>
                        <select id="filterStatus" class="filter-select">


                            <option value="all">Усі статуси</option>

                            <option value="Lead">Lead</option>

                            <option value="Nurturing">Nurturing</option>
                            <option value="Demo">Demo</option>
                            <option value="Won">Won</option>
                            <option value="Lost">Lost</option>
                        </select>

                        <label for="sortClients" class="sr-only">Сортування</label>
                        <select id="sortClients" class="filter-select">
                            <option value="default">За замовчуванням</option>
                            <option value="value-desc">Сума: від більшої</option>
                            <option value="value-asc">Сума: від меншої</option>
                            <option value="name-asc">Ім'я: А-Я</option>
                        </select>

                      

                        <button id="exportCsvBtn" type="button" class="btn-secondary">Експорт CSV</button>
                    </div>
                </div>
            </section>


          
            <section class="summary-stats" aria-label="Summary statistics">
                <div class="summary-stats__grid">
                    <article class="stat-card" aria-live="polite">
                        <div class="stat-card__label">Total Clients</div>
                        <div id="statTotalClients" class="stat-card__value">0</div>
                    </article>

                    <article class="stat-card" aria-live="polite">
                        <div class="stat-card__label">Total Pipeline Value</div>
                        <div id="statTotalPipelineValue" class="stat-card__value">$0</div>
                    </article>

                    <article class="stat-card" aria-live="polite">
                        <div class="stat-card__label">Won Deals</div>
                        <div id="statWonDeals" class="stat-card__value">0</div>
                    </article>
                </div>
            </section>

            <section id="clientsGrid" class="clients-grid" aria-live="polite">
                </section>

            <section id="invoicesSection" class="invoices-section" hidden>
                <div id="invoicesGrid" class="invoices-grid" aria-live="polite"></div>
            </section>
        </main>
    </div>



    <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true" hidden></div>

    <div id="modalOverlay" class="modal-overlay" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <h2 id="modalTitle">Новий клієнт</h2>
            <form id="addClientForm" novalidate>
                <div id="addClientMode" class="form-grid">
                    <div class="field">
                        <label for="clientName" class="sr-only">Ім'я контакту</label>
                        <input type="text" id="clientName" placeholder="Ім'я контакту" required>
                        <div class="field-error" id="clientNameError" role="alert"></div>
                    </div>
                    <div class="field">
                        <label for="companyName" class="sr-only">Назва компанії</label>
                        <input type="text" id="companyName" placeholder="Назва компанії" required>
                        <div class="field-error" id="companyNameError" role="alert"></div>
                    </div>
                    <div class="field">
                        <label for="clientStatus" class="sr-only">Статус</label>
                        <select id="clientStatus" required>
                            <option value="Lead">Lead</option>
                            <option value="Nurturing">Nurturing</option>
                            <option value="Demo">Demo</option>
                            <option value="Won">Won</option>
                            <option value="Lost">Lost</option>
                        </select>
                        <div class="field-error" id="clientStatusError" role="alert"></div>
                    </div>
                    <div class="field">
                        <label for="clientTotalValue" class="sr-only">Total Value</label>
                        <input type="number" id="clientTotalValue" placeholder="Total Value (USD)" min="0" step="100" required>
                        <div class="field-error" id="clientTotalValueError" role="alert"></div>
                    </div>
                </div>

                <div id="deleteClientMode" hidden>
                    <div style="display:flex; flex-direction:column; gap:12px; padding-top:2px;">
                        <div class="field" style="grid-column: 1 / -1;">
                            <label for="deleteUserInput" class="sr-only">Введіть delete</label>
                            <input id="deleteUserInput" type="text" placeholder="Введіть delete" autocomplete="off" required />
                            <div class="field-error" id="deleteUserError" role="alert"></div>
                        </div>
                    </div>
                </div>

                <div class="modal-buttons">
                    <button type="button" id="closeModalBtn" class="btn-secondary">Скасувати</button>
                    <button type="submit" id="saveClientBtn" class="btn-primary">Зберегти</button>
                    <button type="button" id="confirmDeleteBtn" class="btn-primary" hidden>Видалити</button>
                </div>
            </form>
        </div>
    </div>



    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="ui-navi.js"></script>


    <script src="data/clients.js"></script>
    <script src="invoices.js"></script>
    <script src="script.js"></script>


</body>
</html>
